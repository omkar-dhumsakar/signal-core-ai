apiVersion: v1
kind: Service
metadata:
  name: signal-core-api
spec:
  selector:
    app: signal-core-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-core-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: signal-core-api
  template:
    metadata:
      labels:
        app: signal-core-api
    spec:
      containers:
      - name: api
        image: signal-core-ai:latest
        env:
        - name: MODE
          value: "api"
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: signal-core-config
              key: KAFKA_SERVERS
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-core-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signal-core-worker
  template:
    metadata:
      labels:
        app: signal-core-worker
    spec:
      containers:
      - name: worker
        image: signal-core-ai:latest
        env:
        - name: MODE
          value: "worker"
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: signal-core-config
              key: KAFKA_SERVERS
        resources:
          limits:
            cpu: "2000m"
            memory: "4Gi"
          requests:
            cpu: "1000m"
            memory: "2Gi"
