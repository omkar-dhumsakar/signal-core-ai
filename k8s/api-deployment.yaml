apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-core-api
  labels:
    app: signal-core-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: signal-core-api
  template:
    metadata:
      labels:
        app: signal-core-api
    spec:
      containers:
        - name: api
          image: signal-core-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODE
              value: "api"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
